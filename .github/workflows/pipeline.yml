name: Pipeline (Test → Terraform → ECS Deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_WORKING_DIR: infra/terraform
  PROJECT_NAME: shopmart
  ENVIRONMENT: dev

jobs:
  # ──────────────────────────────────────────────────────────
  # Phase 1 — Testing
  # ──────────────────────────────────────────────────────────
  test:
    name: Phase 1 — Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit + integration tests
        run: npm run test:ci

      - name: Upload JUnit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-junit
          path: server/reports/junit.xml
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-coverage
          path: server/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Phase 2 — Infrastructure Provisioning (Terraform)
  # ──────────────────────────────────────────────────────────
  infrastructure:
    name: Phase 2 — Terraform
    runs-on: ubuntu-latest
    needs: test

    outputs:
      ecr_repository_url: ${{ steps.tf_outputs.outputs.ecr_repository_url }}
      ecs_cluster_name:   ${{ steps.tf_outputs.outputs.ecs_cluster_name }}
      ecs_service_name:   ${{ steps.tf_outputs.outputs.ecs_service_name }}
      s3_bucket_name:     ${{ steps.tf_outputs.outputs.s3_bucket_name }}
      alb_dns_name:       ${{ steps.tf_outputs.outputs.alb_dns_name }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_outputs
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)"     >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)"     >> "$GITHUB_OUTPUT"
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)"         >> "$GITHUB_OUTPUT"
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)"             >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────
  # Phase 3 — Container Build & ECS Deployment
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Phase 3 — Build & Deploy
    runs-on: ubuntu-latest
    needs: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set image tag
        id: image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          ECR_URL="${{ needs.infrastructure.outputs.ecr_repository_url }}"
          REGISTRY="${ECR_URL%%/*}"
          echo "tag=${SHORT_SHA}"           >> "$GITHUB_OUTPUT"
          echo "uri=${ECR_URL}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}"       >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${{ steps.image.outputs.registry }}"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.image.outputs.uri }}" \
            -t "${{ needs.infrastructure.outputs.ecr_repository_url }}:latest" \
            ./server

      - name: Push image to ECR
        run: |
          docker push "${{ steps.image.outputs.uri }}"
          docker push "${{ needs.infrastructure.outputs.ecr_repository_url }}:latest"

      - name: Update ECS task definition with new image
        id: render_taskdef
        run: |
          CLUSTER="${{ needs.infrastructure.outputs.ecs_cluster_name }}"
          SERVICE="${{ needs.infrastructure.outputs.ecs_service_name }}"

          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' > taskdef.json

          jq --arg IMAGE "${{ steps.image.outputs.uri }}" '
            .containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' taskdef.json > new-taskdef.json

          NEW_REV_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "task_def_arn=$NEW_REV_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy service to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster  "${{ needs.infrastructure.outputs.ecs_cluster_name }}" \
            --service  "${{ needs.infrastructure.outputs.ecs_service_name }}" \
            --task-definition "${{ steps.render_taskdef.outputs.task_def_arn }}" \
            --force-new-deployment >/dev/null

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster  "${{ needs.infrastructure.outputs.ecs_cluster_name }}" \
            --services "${{ needs.infrastructure.outputs.ecs_service_name }}"

      - name: Verify service is running
        run: |
          CLUSTER="${{ needs.infrastructure.outputs.ecs_cluster_name }}"
          SERVICE="${{ needs.infrastructure.outputs.ecs_service_name }}"

          DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].desiredCount' --output text)
          RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].runningCount' --output text)

          echo "Desired: $DESIRED  Running: $RUNNING"
          if [ "$RUNNING" -lt "$DESIRED" ] || [ "$DESIRED" -eq 0 ]; then
            echo "::error::ECS service is not running the expected number of tasks"
            exit 1
          fi

          echo "Application URL: http://${{ needs.infrastructure.outputs.alb_dns_name }}"
