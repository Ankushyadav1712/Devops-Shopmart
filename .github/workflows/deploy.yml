name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build Client
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/*
          retention-days: 1

      - name: Upload client setup script
        uses: actions/upload-artifact@v4
        with:
          name: client-setup-script
          path: client/setup_ec2.sh
          retention-days: 1

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: dist/

      - name: Download client setup script
        uses: actions/download-artifact@v4
        with:
          name: client-setup-script
          path: client/

      - name: Debug files
        run: |
          echo "Listing files:"
          ls -R dist

      - name: Copy setup script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: client/setup_ec2.sh
          target: /home/${{ secrets.EC2_USERNAME }}/

      - name: Run setup script on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x setup_ec2.sh
            ./setup_ec2.sh

      - name: Copy files to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: dist/*
          target: ${{ vars.EC2_DEPLOY_PATH }}
          strip_components: 1

      - name: Restart web server on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Deployment complete — files copied to ${{ vars.EC2_DEPLOY_PATH }}"
            # Reload Nginx if it is serving the client
            if command -v nginx &> /dev/null; then
              sudo systemctl reload nginx
              echo "Nginx reloaded"
            fi
